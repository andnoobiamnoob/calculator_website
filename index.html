<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Scientific Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}

body{
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.calculator{
    width:430px;
    background:#000;
    border-radius:35px;
    padding:20px;
    box-shadow:
        0 25px 60px rgba(0,0,0,.6),
        inset 0 1px rgba(255,255,255,.08);
}

.display{
    width:100%;
    height:120px;
    background:#000;
    color:white;
    border:none;
    outline:none;
    text-align:right;
    font-size:3rem;
    padding:20px;
    overflow-x:auto;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:12px;
}

button{
    border:none;
    height:68px;
    border-radius:50%;
    font-size:1.2rem;
    cursor:pointer;
    transition:.15s;
    font-weight:500;
}

button:active{
    transform:scale(.95);
}

.gray{
    background:#A5A5A5;
    color:black;
}

.dark{
    background:#333333;
    color:white;
}

.orange{
    background:#FF9F0A;
    color:white;
}

.function{
    background:#1C1C1E;
    color:#4DA3FF;
}

.zero{
    grid-column:span 2;
    border-radius:40px;
}

.credit{
    color:#777;
    text-align:center;
    margin-top:25px;
    font-size:14px;
    letter-spacing:1px;
}
</style>
</head>
<body>

<div class="calculator">

<input type="text" class="display" id="display" readonly>

<div class="buttons">

    <!-- Row 1 -->
    <button class="gray" onclick="clearDisplay()">AC</button>
    <button class="gray" onclick="append('(')">(</button>
    <button class="gray" onclick="append(')')">)</button>
    <button class="function" onclick="append('π')">π</button>
    <button class="orange" onclick="append('/')">÷</button>

    <!-- Row 2 -->
    <button class="function" onclick="append('sin(')">sin</button>
    <button class="function" onclick="append('cos(')">cos</button>
    <button class="function" onclick="append('tan(')">tan</button>
    <button class="function" onclick="append('√(')">√</button>
    <button class="orange" onclick="append('*')">×</button>

    <!-- Row 3 -->
    <button class="function" onclick="append('log(')">log</button>
    <button class="function" onclick="append('ln(')">ln</button>
    <button class="function" onclick="append('e^(')">eˣ</button>
    <button class="function" onclick="append('**')">xʸ</button>
    <button class="orange" onclick="append('-')">−</button>

    <!-- Row 4 -->
    <button class="dark" onclick="append('7')">7</button>
    <button class="dark" onclick="append('8')">8</button>
    <button class="dark" onclick="append('9')">9</button>
    <button class="function" onclick="append('e')">e</button>
    <button class="orange" onclick="append('+')">+</button>

    <!-- Row 5 -->
    <button class="dark" onclick="append('4')">4</button>
    <button class="dark" onclick="append('5')">5</button>
    <button class="dark" onclick="append('6')">6</button>
    <button class="function" onclick="factorial()">n!</button>
    <button class="orange" onclick="calculate()">=</button>
    
    <!-- Row 6 -->
    <button class="dark" onclick="append('1')">1</button>
    <button class="dark" onclick="append('2')">2</button>
    <button class="dark" onclick="append('3')">3</button>
    <button class="function" onclick="append('%')">%</button>
    <button class="dark" onclick="append('.')">.</button>

    <!-- Row 7 -->
    <button class="dark zero" onclick="append('0')">0</button>
    <button class="function" onclick="backspace()">⌫</button>

</div>

<div class="credit">
Made by Shantanu Rana
</div>

</div>

<script>
const display = document.getElementById("display");

function append(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

function backspace(){
    display.value = display.value.slice(0,-1);
}

function factorial(){
    let n = Number(display.value);

    if(n < 0 || !Number.isInteger(n)){
        display.value = "Error";
        return;
    }

    let result = 1;

    for(let i=2;i<=n;i++){
        result *= i;
    }

    display.value = result;
}

function calculate() {
    try {

        let expression = display.value;

        expression = expression.replaceAll("sin(", "Math.sin(");
        expression = expression.replaceAll("cos(", "Math.cos(");
        expression = expression.replaceAll("tan(", "Math.tan(");

        expression = expression.replaceAll("√(", "Math.sqrt(");

        expression = expression.replaceAll("log(", "Math.log10(");
        expression = expression.replaceAll("ln(", "Math.log(");

        expression = expression.replaceAll("e^(", "Math.exp(");

        expression = expression.replaceAll("π", "Math.PI");
        expression = expression.replaceAll("e", "Math.E");

        let result = eval(expression);

        display.value = result;

    } catch {
        display.value = "Error";
    }
}
</script>

</body>
</html>
